name: Supabase keep-alive

# Free-tier Supabase pauses a project after 7 days with no database activity.
# This calls a tiny RPC (public.keepalive → "select now()") once a day so
# Postgres sees a real query and the inactivity timer resets. It fails loudly
# (non-zero exit) on any error so a broken keep-alive is visible in the Actions
# tab. Also runnable on demand via "Run workflow".

on:
  schedule:
    - cron: "0 6 * * *" # daily at 06:00 UTC
  workflow_dispatch: {}

# No repo access needed — this only makes an outbound HTTPS request.
permissions: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Postgres via keepalive RPC
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${SUPABASE_URL:-}" ] || [ -z "${SUPABASE_ANON_KEY:-}" ]; then
            echo "::error::Missing repo secret(s): set SUPABASE_URL and SUPABASE_ANON_KEY"
            exit 1
          fi

          url="${SUPABASE_URL%/}/rest/v1/rpc/keepalive"
          echo "POST $url"

          # -sS surfaces errors but doesn't fail the step on HTTP 4xx/5xx (we want
          # to read the body), so capture the body and HTTP status, then assert.
          resp="$(curl -sS -m 30 -w $'\n%{http_code}' \
            -X POST "$url" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
            -H "Content-Type: application/json" \
            -d '{}')"

          body="$(printf '%s' "$resp" | sed '$d')"
          code="$(printf '%s' "$resp" | tail -n1)"
          echo "HTTP $code"
          echo "Body: $body"

          if [ "$code" != "200" ]; then
            echo "::error::keepalive RPC returned HTTP $code (expected 200). Body: $body"
            exit 1
          fi

          # The RPC returns a live timestamp (e.g. "2026-06-11T06:00:00.12+00:00").
          # Requiring a real date proves Postgres actually ran the query — a
          # cached/empty response would not contain one.
          if ! printf '%s' "$body" | grep -qE '[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}'; then
            echo "::error::No timestamp in response — the query may not have hit Postgres. Body: $body"
            exit 1
          fi

          echo "Keep-alive OK — Postgres responded with a live timestamp."
